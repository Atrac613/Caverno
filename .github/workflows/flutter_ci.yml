name: Flutter CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        id: flutter-version
        shell: bash
        run: |
          version="$(sed -n 's/.*"flutter"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .fvmrc)"
          if [ -z "$version" ]; then
            echo "Could not read Flutter version from .fvmrc."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated files are up to date
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Ensure generated files were committed
        run: git diff --exit-code

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test
